<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Validador AATT | SSDR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet"/>
<style>
  body{background:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  .scroll-y{overflow-y:auto;max-height:55vh;}
  .btn-p{background:#1d4ed8;color:#fff;border-radius:12px;padding:12px;font-weight:600;width:100%;cursor:pointer;border:none;font-size:15px;}
  .btn-p:disabled{opacity:.4;cursor:not-allowed;}
  .btn-s{background:#fff;color:#6b7280;border:2px solid #e5e7eb;border-radius:12px;padding:10px;font-weight:500;width:100%;cursor:pointer;font-size:14px;}
  .card{border-radius:12px;border:2px solid;padding:12px 14px;margin-bottom:6px;text-align:left;width:100%;cursor:pointer;background:#fff;font-size:14px;transition:all .15s;}
  .card.sel{border-color:#2563eb;background:#eff6ff;color:#1e40af;font-weight:600;}
  .card.uns{border-color:#e5e7eb;color:#374151;}
  .tag{display:inline-block;font-size:11px;border-radius:20px;padding:2px 10px;font-weight:700;color:#fff;}
  .via-pill{display:inline-block;font-size:10px;border-radius:10px;padding:2px 8px;font-weight:700;margin-left:6px;vertical-align:middle;}
  .pending-note{font-size:11px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;margin-bottom:12px;color:#92400e;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ============================================================
   MOTOR DE REGLAS
   Editar solo este bloque al actualizar normativa.
   via: "nges" | "ges"
   pending: true = en verificación normativa (fuerza amarillo)
   matrix: [bastón, andador, silla, cojín, colchón]
   ============================================================ */
const CONDITIONS = [
  // ── No GES ──────────────────────────────────────────────
  {id:"artrosis",     label:"Artrosis de cadera o rodilla",           via:"nges", minAge:45, maxAge:64, pending:false,
   severity:{q:"Grado de la artrosis", opts:["Leve","Moderada","Severa"], ok:["Moderada","Severa"]},
   clinicalCheck:null,
   matrix:[1,1,0,0,0]},

  {id:"dependiente",  label:"Dependiente Severo",                      via:"nges", minAge:45, maxAge:64, pending:false,
   severity:null, clinicalCheck:null,
   matrix:[0,0,1,1,1]},

  {id:"diabetes",     label:"Diabetes con úlcera activa de pie",       via:"nges", minAge:45, maxAge:64, pending:false,
   severity:null, clinicalCheck:"¿La úlcera está siendo tratada con curación avanzada actualmente?",
   matrix:[1,0,0,1,1]},

  {id:"acv_nges",     label:"ACV (no GES: I60.8 / I61 / I62)",        via:"nges", minAge:0,  maxAge:64, pending:false,
   severity:{q:"Severidad del ACV", opts:["Leve","Moderado","Severo"], ok:["Leve","Moderado","Severo"]},
   clinicalCheck:"¿El código CIE-10 corresponde a I60.8, I61 o I62?",
   matrix:[1,1,1,1,1]},

  {id:"amputacion",   label:"Amputación de extremidades inferiores",   via:"nges", minAge:0,  maxAge:64, pending:false,
   severity:null, clinicalCheck:null,
   matrix:[1,1,1,0,0]},

  {id:"lesion_med",   label:"Lesión Medular",                          via:"nges", minAge:0,  maxAge:64, pending:false,
   severity:null, clinicalCheck:null,
   matrix:[0,0,1,1,1]},

  {id:"post_uci",     label:"Síndrome Post-UCI / Post COVID-19",       via:"nges", minAge:0,  maxAge:64, pending:false,
   severity:null, clinicalCheck:null,
   matrix:[1,1,1,0,0]},

  // ── GES ─────────────────────────────────────────────────
  {id:"acv_ges",      label:"ACV isquémico (GES Nº37)",               via:"ges",  minAge:15, maxAge:64, pending:false,
   severity:null, clinicalCheck:"¿El código CIE-10 corresponde a ACV isquémico GES (Nº37)?",
   matrix:[1,1,1,1,1]},

  {id:"parkinson",    label:"Enfermedad de Parkinson (GES Nº62)",      via:"ges",  minAge:0,  maxAge:64, pending:false,
   severity:null, clinicalCheck:"¿Diagnóstico confirmado de Enfermedad de Parkinson?",
   matrix:[1,1,1,1,1]},

  {id:"hemorragia",   label:"Hemorragia subaracnoidea (GES Nº42)",    via:"ges",  minAge:0,  maxAge:64, pending:false,
   severity:null, clinicalCheck:"¿Confirmación de hemorragia subaracnoidea por aneurisma roto?",
   matrix:[1,1,1,1,1]},

  {id:"disrafia",     label:"Disrafia espinal abierta (GES Nº9)",      via:"ges",  minAge:0,  maxAge:64, pending:false,
   severity:null, clinicalCheck:"¿Diagnóstico confirmado de disrafia espinal abierta?",
   matrix:[1,1,1,1,1]},

  {id:"esclerosis",   label:"Esclerosis Múltiple RR (GES Nº67)",      via:"ges",  minAge:0,  maxAge:64, pending:true,
   severity:null, clinicalCheck:"¿Diagnóstico confirmado de Esclerosis Múltiple Remitente Recurrente?",
   matrix:[1,1,1,1,1]},

  {id:"osteosarcoma", label:"Osteosarcoma (GES Nº73)",                 via:"ges",  minAge:15, maxAge:64, pending:true,
   severity:null, clinicalCheck:"¿Diagnóstico confirmado de Osteosarcoma?",
   matrix:[1,1,1,0,0]},
];

const AATT = ["Bastón","Andador","Silla de Ruedas","Cojín Antiescara","Colchón Antiescara"];
const VIA_META = {
  nges:{label:"No GES",  norm:"OOTT MINSAL 2022",      color:"#1d4ed8", bg:"#eff6ff"},
  ges: {label:"GES",     norm:"DS N°72/2022 + D.22",   color:"#15803d", bg:"#f0fdf4"},
};

function genId(dx,age){return dx.substring(0,3).toUpperCase()+"-"+age+"-"+Date.now().toString().slice(-4);}

const SC={
  eligible:  {bg:"#f0fdf4",bd:"#4ade80",tag:"bg-green-500",  label:"ELEGIBLE",         em:"🟢"},
  review:    {bg:"#fffbeb",bd:"#facc15",tag:"bg-yellow-500", label:"REQUIERE REVISIÓN", em:"🟡"},
  ineligible:{bg:"#fef2f2",bd:"#f87171",tag:"bg-red-500",    label:"NO ELEGIBLE",       em:"🔴"},
};

function App(){
  const [step,setStep]     = React.useState(1);   // 1=edad 2=condición 3=criterios 4=aatt 5=resultado
  const [age,setAge]       = React.useState("");
  const [condId,setCondId] = React.useState("");
  const [severity,setSev]  = React.useState("");
  const [clinAns,setClin]  = React.useState(null);
  const [aattIdx,setAatt]  = React.useState(null);
  const [result,setResult] = React.useState(null);
  const [caseId,setCaseId] = React.useState("");

  const a = parseInt(age)||0;

  // Condiciones filtradas por edad
  const available = CONDITIONS.filter(c => a>=c.minAge && a<=c.maxAge);

  const cond = CONDITIONS.find(c=>c.id===condId);
  const needsExtra = cond && (cond.severity || cond.clinicalCheck);
  const extOk = (!cond?.severity||severity) && (!cond?.clinicalCheck||clinAns!==null);

  const reset=()=>{setStep(1);setAge("");setCondId("");setSev("");setClin(null);setAatt(null);setResult(null);setCaseId("");};

  const afterCond=()=>{ needsExtra ? setStep(3) : setStep(4); };

  const validate=()=>{
    const ok=[],warn=[],fail=[];

    // Rango (ya filtrado en pantalla, pero doble chequeo)
    if(a<cond.minAge) fail.push("Edad "+a+" años bajo el mínimo ("+cond.minAge+" años) para esta condición.");
    else if(a>cond.maxAge) fail.push("Edad "+a+" años supera el máximo ("+cond.maxAge+" años).");
    else{
      ok.push("Rango etario cumplido ("+a+" años).");
      if(a>=63) warn.push("Edad cercana al límite. Considerar temporalidad de recambio antes de los 65 años.");
    }

    // Severidad
    if(cond.severity){
      if(cond.severity.ok.includes(severity)) ok.push("Severidad \""+severity+"\" contemplada.");
      else fail.push("Severidad \""+severity+"\" no cumple (requiere: "+cond.severity.ok.join(" o ")+").");
    }

    // Requisito clínico
    if(cond.clinicalCheck){
      if(clinAns===true) warn.push("Requisito clínico confirmado por el profesional. Adjuntar evidencia al referente.");
      else fail.push("Requisito clínico no cumplido: "+cond.clinicalCheck);
    }

    // Verificación normativa pendiente
    if(cond.pending) warn.push("Cobertura de AATT para esta patología en menores de 65 años está en verificación con DIPRECE/referente. Resultado provisional.");

    // AATT
    if(cond.matrix[aattIdx]) ok.push(AATT[aattIdx]+" indicado para esta condición según normativa vigente.");
    else fail.push(AATT[aattIdx]+" no contemplado para esta condición en la normativa vigente.");

    const status = fail.length>0?"ineligible":warn.length>0?"review":"eligible";
    setCaseId(genId(condId,a));
    setResult({status,ok,warn,fail,cond,aatt:AATT[aattIdx]});
    setStep(5);
  };

  const STEPS = ["Edad","Diagnóstico","Criterios","AATT","Resultado"];

  const Stepper=()=>(
    <div style={{background:"#fff",padding:"10px 20px 6px"}}>
      <div style={{display:"flex",alignItems:"center",gap:2}}>
        {STEPS.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",flex:1}}>
            <div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,
              background:step>i?"#1d4ed8":"#e5e7eb",color:step>i?"#fff":"#9ca3af"}}>{i+1}</div>
            {i<4&&<div style={{flex:1,height:3,background:step>i+1?"#1d4ed8":"#e5e7eb",margin:"0 2px",borderRadius:2}}/>}
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:9,color:"#9ca3af"}}>
        {STEPS.map((s,i)=><span key={i}>{s}</span>)}
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#f3f4f6",display:"flex",justifyContent:"center",padding:"12px"}}>
      <div style={{width:"100%",maxWidth:430}}>

        {/* HEADER */}
        <div style={{background:"#1d4ed8",color:"#fff",borderRadius:"16px 16px 0 0",padding:"14px 16px",textAlign:"center"}}>
          <div style={{fontSize:10,letterSpacing:2,opacity:.75,textTransform:"uppercase",marginBottom:3}}>Servicio de Salud Reloncaví</div>
          <div style={{fontSize:18,fontWeight:700}}>Validador AATT</div>
          <div style={{fontSize:11,opacity:.7,marginTop:2}}>OOTT No GES 2022 · DS N°72/2022 · Decreto 22</div>
        </div>

        <Stepper/>

        {/* BODY */}
        <div style={{background:"#fff",padding:"18px 20px 20px",borderRadius:"0 0 16px 16px",boxShadow:"0 2px 8px rgba(0,0,0,.08)"}}>

          {/* PASO 1 – Edad */}
          {step===1&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:4}}>Edad del paciente</div>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:14}}>No se registran datos identificatorios. Solo se evalúan personas menores de 65 años.</div>
              <input type="number" min="1" max="100" placeholder="Ej: 52" value={age}
                onChange={e=>{setAge(e.target.value);setCondId("");setSev("");setClin(null);setAatt(null);}}
                style={{width:"100%",border:"2px solid #e5e7eb",borderRadius:12,padding:12,fontSize:28,fontWeight:700,textAlign:"center",outline:"none",boxSizing:"border-box"}}/>
              {a>0&&a<65&&(
                <div style={{fontSize:11,color:"#15803d",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"6px 12px",marginTop:10,textAlign:"center"}}>
                  ✓ {available.length} condición{available.length!==1?"es":""} disponible{available.length!==1?"s":""} para {a} años
                </div>
              )}
              {a>=65&&(
                <div style={{fontSize:11,color:"#b91c1c",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"6px 12px",marginTop:10,textAlign:"center"}}>
                  Personas de 65 años o más tienen cobertura por GES Nº36 (AATT adulto mayor). Esta app no aplica.
                </div>
              )}
              <button onClick={()=>setStep(2)} disabled={!age||a<=0||a>=65||available.length===0} className="btn-p" style={{marginTop:16}}>
                Continuar →
              </button>
            </div>
          )}

          {/* PASO 2 – Diagnóstico */}
          {step===2&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:2}}>Diagnóstico principal</div>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:10}}>Condiciones disponibles para {a} años. CIE-10 a cargo del profesional.</div>
              <div className="scroll-y">
                {/* Agrupar por vía */}
                {["nges","ges"].map(v=>{
                  const grupo = available.filter(c=>c.via===v);
                  if(!grupo.length) return null;
                  const vm = VIA_META[v];
                  return(
                    <div key={v} style={{marginBottom:12}}>
                      <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:vm.color,marginBottom:6,paddingLeft:2}}>
                        {vm.label} · {vm.norm}
                      </div>
                      {grupo.map(c=>(
                        <button key={c.id} onClick={()=>{setCondId(c.id);setSev("");setClin(null);}}
                          className={"card "+(condId===c.id?"sel":"uns")}>
                          <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:4}}>
                            {c.label}
                            {c.pending&&<span style={{fontSize:10,background:"#fef3c7",color:"#92400e",border:"1px solid #fde68a",borderRadius:8,padding:"1px 6px",fontWeight:600}}>En verificación</span>}
                          </div>
                        </button>
                      ))}
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <button onClick={()=>setStep(1)} className="btn-s">← Atrás</button>
                <button onClick={afterCond} disabled={!condId} className="btn-p">Continuar →</button>
              </div>
            </div>
          )}

          {/* PASO 3 – Criterios */}
          {step===3&&cond&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:10}}>Criterios clínicos</div>
              {cond.pending&&(
                <div className="pending-note">⚠️ Esta patología está en verificación normativa. El resultado se marcará como "Requiere revisión" mientras se confirma cobertura AATT con DIPRECE.</div>
              )}
              {cond.severity&&(
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#4b5563",marginBottom:8}}>{cond.severity.q}</div>
                  {cond.severity.opts.map(o=>(
                    <button key={o} onClick={()=>setSev(o)} className={"card "+(severity===o?"sel":"uns")}>
                      {o}{!cond.severity.ok.includes(o)&&<span style={{fontSize:11,color:"#ef4444",marginLeft:8}}>(no cubierto)</span>}
                    </button>
                  ))}
                </div>
              )}
              {cond.clinicalCheck&&(
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:"#4b5563",marginBottom:8}}>{cond.clinicalCheck}</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setClin(true)}
                      style={{flex:1,padding:10,borderRadius:12,border:"2px solid",borderColor:clinAns===true?"#22c55e":"#e5e7eb",background:clinAns===true?"#f0fdf4":"#fff",fontWeight:600,fontSize:14,cursor:"pointer",color:clinAns===true?"#15803d":"#374151"}}>Sí</button>
                    <button onClick={()=>setClin(false)}
                      style={{flex:1,padding:10,borderRadius:12,border:"2px solid",borderColor:clinAns===false?"#ef4444":"#e5e7eb",background:clinAns===false?"#fef2f2":"#fff",fontWeight:600,fontSize:14,cursor:"pointer",color:clinAns===false?"#b91c1c":"#374151"}}>No</button>
                  </div>
                </div>
              )}
              <div style={{display:"flex",gap:8,marginTop:14}}>
                <button onClick={()=>setStep(2)} className="btn-s">← Atrás</button>
                <button onClick={()=>setStep(4)} disabled={!extOk} className="btn-p">Continuar →</button>
              </div>
            </div>
          )}

          {/* PASO 4 – AATT */}
          {step===4&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:4}}>Ayuda técnica solicitada</div>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:10}}>AATT que se desea prescribir.</div>
              {AATT.map((at,i)=>(
                <button key={i} onClick={()=>setAatt(i)} className={"card "+(aattIdx===i?"sel":"uns")}>
                  {at}
                  {cond&&!cond.matrix[i]&&<span style={{fontSize:11,color:"#9ca3af",marginLeft:8}}>(no indicado para este diagnóstico)</span>}
                </button>
              ))}
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button onClick={()=>setStep(needsExtra?3:2)} className="btn-s">← Atrás</button>
                <button onClick={validate} disabled={aattIdx===null} className="btn-p">Validar</button>
              </div>
            </div>
          )}

          {/* PASO 5 – Resultado */}
          {step===5&&result&&(()=>{
            const cfg = SC[result.status];
            const vm  = VIA_META[result.cond.via];
            return(
              <div>
                <div style={{borderRadius:12,border:"2px solid",borderColor:cfg.bd,background:cfg.bg,padding:16,marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <span style={{fontSize:32}}>{cfg.em}</span>
                    <div>
                      <span className={"tag "+cfg.tag}>{cfg.label}</span>
                      <div style={{marginTop:4,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:10,fontWeight:700,background:vm.bg,color:vm.color,border:"1px solid",borderColor:vm.color,borderRadius:10,padding:"1px 8px"}}>
                          {vm.label} · {vm.norm}
                        </span>
                      </div>
                    </div>
                  </div>

                  <div style={{fontSize:13,color:"#374151",marginBottom:2}}>📋 {result.cond.label}</div>
                  <div style={{fontSize:13,color:"#374151",marginBottom:12}}>🦾 {result.aatt} · {age} años</div>
                  <div style={{fontSize:10,color:"#6b7280",marginBottom:12,fontFamily:"monospace"}}>ID: {caseId}</div>

                  {result.fail.length>0&&(
                    <div style={{marginBottom:10}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#dc2626",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>No cumple</div>
                      {result.fail.map((r,i)=><div key={i} style={{fontSize:12,background:"rgba(255,255,255,.7)",borderRadius:8,padding:"6px 10px",marginBottom:4,color:"#374151"}}>🔴 {r}</div>)}
                    </div>
                  )}
                  {result.warn.length>0&&(
                    <div style={{marginBottom:10}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#92400e",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Revisar</div>
                      {result.warn.map((r,i)=><div key={i} style={{fontSize:12,background:"rgba(255,255,255,.7)",borderRadius:8,padding:"6px 10px",marginBottom:4,color:"#374151"}}>🟡 {r}</div>)}
                    </div>
                  )}
                  {result.ok.length>0&&(
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:"#15803d",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Cumple</div>
                      {result.ok.map((r,i)=><div key={i} style={{fontSize:12,background:"rgba(255,255,255,.7)",borderRadius:8,padding:"6px 10px",marginBottom:4,color:"#374151"}}>🟢 {r}</div>)}
                    </div>
                  )}
                </div>

                {result.status==="review"&&(
                  <div style={{fontSize:11,color:"#92400e",background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
                    ⚠️ Puede continuar con la solicitud. El referente revisará los puntos marcados.
                  </div>
                )}

                <div style={{fontSize:11,color:"#9ca3af",textAlign:"center",marginBottom:12}}>
                  Validación orientativa. No reemplaza el juicio clínico ni la responsabilidad profesional.
                </div>

                {/* Documentos */}
                <div style={{display:"flex",gap:8,marginBottom:14}}>
                  <a href="https://www.minsal.cl" target="_blank" rel="noopener noreferrer"
                    style={{flex:1,background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"7px",fontSize:10,color:"#1e40af",textAlign:"center",textDecoration:"none",fontWeight:600}}>📄 OOTT No GES 2022</a>
                  <a href="https://www.bcn.cl/leychile/navegar?idNorma=1135882" target="_blank" rel="noopener noreferrer"
                    style={{flex:1,background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"7px",fontSize:10,color:"#14532d",textAlign:"center",textDecoration:"none",fontWeight:600}}>📄 Decreto 22 (2017)</a>
                </div>

                <button onClick={reset} className="btn-p">Nueva consulta</button>
              </div>
            );
          })()}

        </div>

        <div style={{textAlign:"center",fontSize:10,color:"#9ca3af",marginTop:10,paddingBottom:16}}>
          Motor de reglas: OOTT No GES 2022 + DS N°72/2022 · v3.0
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
